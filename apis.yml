aid: data-london-gov-uk
name: London Datastore
description: >-
  London Datastore is a open data portal open-data portal for GB running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately an open datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
